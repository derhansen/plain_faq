<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:core="http://typo3.org/ns/TYPO3/CMS/Core/ViewHelpers"
      data-namespace-typo3-fluid="true">

<f:if condition="{data}">
    <f:then>
        <table class="table table-condensed plainfaq-table">
            <tbody>
            <f:for each="{data}" as="item">
                <tr>
                    <th>{item.title}</th>
                    <td>
                        <f:if condition="{item.icon}">
                            <core:icon identifier="{item.icon}" size="small" />
                        </f:if>
                        <f:if condition="{item.value}">
                            {item.value -> f:format.raw()}
                        </f:if>
                    </td>
                </tr>
            </f:for>
            </tbody>
        </table>
    </f:then>
</f:if>

</html>
